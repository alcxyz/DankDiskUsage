name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate plugin.json
        run: python3 -c "import json; json.load(open('plugin.json'))"

      - name: Check version format
        run: |
          VERSION="$(jq -r .version plugin.json)"
          echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Auto-tag release
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(jq -r .version plugin.json)"
          TARGET_SHA="$(git rev-parse HEAD)"

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "Creating tag $VERSION at $TARGET_SHA"
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f "ref=refs/tags/${VERSION}" \
              -f "sha=${TARGET_SHA}" >/dev/null
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${VERSION}" >/dev/null

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(jq -r .version plugin.json)"
          TARGET_SHA="$(git rev-parse HEAD)"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" \
              --draft=false \
              --prerelease=false \
              --latest \
              --target "$TARGET_SHA" \
              --verify-tag
          else
            gh release create "$VERSION" \
              --target "$TARGET_SHA" \
              --latest \
              --verify-tag \
              --generate-notes
          fi
