name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate plugin.json
        run: |
          python3 - <<'PY'
          import json
          import re

          with open("plugin.json", encoding="utf-8") as f:
              plugin = json.load(f)

          version = plugin.get("version", "")
          if not re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", version):
              raise SystemExit(f"plugin.json version must be X.Y.Z, got {version!r}")
          PY

      - uses: actions/setup-go@v6
        if: ${{ hashFiles('go.mod') != '' }}
        with:
          go-version-file: go.mod

      - name: Build Go packages
        if: ${{ hashFiles('go.mod') != '' }}
        run: go build ./...

      - name: Go unit tests
        if: ${{ hashFiles('go.mod') != '' }}
        run: go test ./...

      - name: Run plugin tests
        if: ${{ hashFiles('test.sh') != '' }}
        run: bash test.sh

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read plugin version
        id: version
        run: |
          VERSION="$(python3 -c 'import json; print(json.load(open("plugin.json", encoding="utf-8"))["version"])')"
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Auto-tag release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TARGET_SHA="$(git rev-parse HEAD)"

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping."
          else
            echo "Creating tag $VERSION at $TARGET_SHA"
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f "ref=refs/tags/${VERSION}" \
              -f "sha=${TARGET_SHA}" >/dev/null
          fi

          gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${VERSION}" >/dev/null

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TARGET_SHA="$(git rev-parse HEAD)"

          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release edit "$VERSION" \
              --draft=false \
              --prerelease=false \
              --latest \
              --target "$TARGET_SHA" \
              --verify-tag
          else
            gh release create "$VERSION" \
              --target "$TARGET_SHA" \
              --latest \
              --verify-tag \
              --generate-notes
          fi
